name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS arm64 (Apple Silicon) - 优先支持
          - os: macos-latest
            target: darwin-arm64
            artifact_name: corivo-Darwin-arm64.tar.gz
          # Linux x64
          - os: ubuntu-latest
            target: linux-x64
            artifact_name: corivo-Linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Create package directory
        run: |
          mkdir -p release/corivo/bin
          cp -r dist release/corivo/
          cp -r node_modules release/corivo/
          cp bin/corivo.js release/corivo/bin/
          cp package.json release/corivo/
          cp README.md release/corivo/
          cp LICENSE release/corivo/ 2>/dev/null || true

      - name: Make executable
        run: chmod +x release/corivo/bin/corivo.js

      - name: Create tarball
        run: |
          cd release
          tar czf ../${{ matrix.artifact_name }} corivo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            sha256sum *.tar.gz > checksums.txt
            cd ..
          done
          # 合并所有 checksums
          cat */checksums.txt > ../checksums.txt

      - name: Generate version.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # 获取 checksums
          declare -A CHECKSUMS
          for file in artifacts/*/*.tar.gz; do
            if [ -f "$file" ]; then
              sum=$(sha256sum "$file" | cut -d' ' -f1)
              filename=$(basename "$file")
              CHECKSUMS[$filename]=$sum
            fi
          done

          cat > version.json <<EOF
          {
            "version": "$VERSION",
            "released_at": "$RELEASED_AT",
            "breaking": false,
            "changelog": "See release notes at https://github.com/xiaolin26/Corivo/releases/tag/$VERSION",
            "binaries": {
              "Darwin-arm64": {
                "url": "https://github.com/xiaolin26/Corivo/releases/download/$VERSION/corivo-Darwin-arm64.tar.gz",
                "checksum": "sha256:${CHECKSUMS[corivo-Darwin-arm64.tar.gz]}"
              },
              "Darwin-x64": {
                "url": "https://github.com/xiaolin26/Corivo/releases/download/$VERSION/corivo-Darwin-x64.tar.gz",
                "checksum": "sha256:${CHECKSUMS[corivo-Darwin-x64.tar.gz]}"
              },
              "Linux-x64": {
                "url": "https://github.com/xiaolin26/Corivo/releases/download/$VERSION/corivo-Linux-x64.tar.gz",
                "checksum": "sha256:${CHECKSUMS[corivo-Linux-x64.tar.gz]}"
              }
            }
          }
          EOF

          echo "Generated version.json:"
          cat version.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/*.tar.gz
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
